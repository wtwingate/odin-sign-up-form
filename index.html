<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/global.css" />
    <title>Sign Up</title>
  </head>
  <body>
    <main>
      <div id="hero-block">
        <div id="hero-banner">
          <img
            src="public/odin-lined.png"
            alt="The Odin Project Logo"
            height="128px"
          />
          <h1>Odin</h1>
        </div>
        <p>
          Photo by
          <a
            href="https://unsplash.com/@aleksdahlberg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash"
            >Aleks Dahlberg</a
          >
          on
          <a
            href="https://unsplash.com/photos/snow-capped-mountans-pVATCBKLH8w?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash"
            >Unsplash</a
          >
        </p>
      </div>
      <div id="signup-block">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p>You <em>know</em> you want to.</p>
        <form action="https://example.com/sign-up">
          <p>Let's do this!</p>
          <div class="input-row">
            <div class="input-item">
              <label for="first-name">First Name</label>
              <input type="text" name="firstName" id="first-name" required />
            </div>
            <div class="input-item">
              <label for="last-name">Last Name</label>
              <input type="text" name="lastName" id="last-name" required />
            </div>
          </div>
          <div class="input-row">
            <div class="input-item">
              <label for="email-address">Email</label>
              <input
                type="email"
                name="emailAddress"
                id="email-address"
                required
              />
            </div>
            <div class="input-item">
              <label for="phone-number">Phone Number</label>
              <input type="tel" name="phoneNumber" id="phone-number" required />
            </div>
          </div>
          <div class="input-row">
            <div class="input-item">
              <label for="password">Password</label>
              <input
                type="password"
                name="password"
                id="password"
                minlength="12"
                required
              />
            </div>
            <div class="input-item">
              <label for="confirm-password">Confirm Password</label>
              <input
                type="password"
                name="confirmPassword"
                id="confirm-password"
                minlength="12"
                required
              />
            </div>
          </div>
          <button type="submit">Create Account</button>
        </form>
        <p>
          Already have an account?
          <a href="https://example.com/login">Log in</a>
        </p>
      </div>
    </main>
  </body>
</html>
