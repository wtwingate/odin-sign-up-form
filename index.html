<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body>
    <div class="container" id="image-container">
      <div class="container" id="logo-container">
        <img src="./images/odin-logo.png" alt="Odin, the all-father" />
        <div id="logo-text">ODIN</div>
      </div>
      <p id="image-credit">
        Photo by
        <a
          href="https://unsplash.com/@vingtcent?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash"
        >
          Vincent Guth
        </a>
        on
        <a
          href="https://unsplash.com/photos/silhouette-photo-of-aurora-borealis-uhoILl3HUZM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash"
        >
          Unsplash
        </a>
      </p>
    </div>
    <div class="container" id="form-container">
      <h1>Sign up now!</h1>
      <p id="appeal">
        Here's some text trying to bait you into giving us your contact
        information. We promise not to sell it to advertisers or do anything
        nefarious with it. Trust us!
      </p>
      <form action="https://httpbin.org/post" method="post">
        <div id="form-block">
          <h2>Let us dox you!</h2>
          <ul>
            <li>
              <label for="first-name">First name</label>
              <input type="text" id="first-name" name="first-name" required />
            </li>
            <li>
              <label for="last-name">Last name</label>
              <input type="text" id="last-name" name="last-name" required />
            </li>
            <li>
              <label for="email-address">Email</label>
              <input
                type="email"
                id="email-address"
                name="email-address"
                required
              />
            </li>
            <li>
              <label for="phone-number">Phone</label>
              <input
                type="tel"
                id="phone-number"
                name="phone-number"
                required
              />
            </li>
            <li>
              <label for="input-password">Password</label>
              <input
                type="password"
                class="error"
                id="input-password"
                name="input-password"
                pattern="(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z]).{8,16}"
                oninvalid="setCustomValidity('Password must be 8-16 characters long and include A-Z, a-z, and 0-9')"
                required
              />
            </li>
            <li>
              <label for="confirm-password">Confirm password</label>
              <input
                type="password"
                class="error"
                id="confirm-password"
                name="confirm-password"
                pattern="(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z]).{8,16}"
                oninvalid="setCustomValidity('Password must be 8-16 characters long and include A-Z, a-z, and 0-9')"
                required
              />
            </li>
          </ul>
        </div>
        <div id="submit-input">
          <h2>Push the button! Do it!</h2>
          <button type="submit">Surrender!</button>
        </div>
      </form>
      <p id="login">Already sold your soul? <a href="">Log in</a></p>
    </div>
    <script>
      const login = document.querySelector("#login");
      login.addEventListener("click", () =>
        alert("This isn't a real website, ya dingus!")
      );
    </script>
  </body>
</html>
